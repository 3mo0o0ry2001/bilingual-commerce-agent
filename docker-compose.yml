services:
  db:
    image: postgres:16
    container_name: perfume_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: perfume_admin
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: perfume_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfume_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: perfume_agent_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://perfume_admin:dev_password_change_me@db:5432/perfume_agent
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/chroma:/app/data/chroma

volumes:
  pgdata: